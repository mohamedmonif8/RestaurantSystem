<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جهاز  المطبخ | أبو مهل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #141414; color: #fff; padding: 0; margin: 0; }
        
        /* شاشة الدخول */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: #1f1f1f; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #E50914; box-shadow: 0 10px 30px rgba(0,0,0,0.5 ); }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 10px; background: #141414; color: white; font-family: 'Cairo'; outline: none; }
        .login-box input:focus { border-color: #E50914; }
        .login-box button { width: 100%; padding: 15px; background: #E50914; color: white; border: none; border-radius: 10px; font-family: 'Cairo'; font-weight: 900; cursor: pointer; font-size: 18px; margin-top: 10px; }
        
        /* التطبيق الرئيسي */
        #mainApp { display: none; flex-direction: column; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1f1f1f; padding: 15px 25px; border-radius: 15px; border-bottom: 3px solid #E50914; }
        h2 { margin: 0; color: #fff; }
        select { padding: 10px; font-family: 'Cairo'; border-radius: 8px; background: #333; color: white; border: none; outline: none; }
        .logout-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        
        .tabs { margin-top: 20px; display: flex; gap: 10px; }
        .tabs button { padding: 12px 25px; background: #1f1f1f; color: #aaa; border: none; cursor: pointer; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; }
        .tabs button.active { background: #E50914; color: white; }
        
        #ordersSection { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #1f1f1f; padding: 20px; border-radius: 15px; border-right: 6px solid #E50914; display: flex; flex-direction: column; position: relative; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .order-items { flex-grow: 1; font-size: 18px; line-height: 1.8; color: #eee; font-weight: bold; }
        .order-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: 900; font-size: 15px; }
        .btn-prep { background: #E50914; color: white; } .btn-ready { background: #27ae60; color: white; } .btn-done { background: #2980b9; color: white; }
        
        .print-btn { position: absolute; top: 15px; left: 15px; background: #333; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-size: 12px; }
        .print-btn:hover { background: #555; }

        /* إعدادات الطباعة الحرارية (Receipt) */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 80mm; padding: 10px; font-family: 'Cairo', sans-serif; color: black; background: white; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#E50914;">👨‍🍳 دخول المطبخ</h2>
            <input type="text" id="loginUser" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="header">
            <h2>👨‍🍳 مطبخ أبو مهل</h2>
            <div style="display: flex; gap: 15px;">
                <select id="branchSelect" onchange="forceLoadData()"></select>
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>
        </div>
        <div class="tabs">
            <button id="tab-orders" class="active" onclick="switchTab('orders')">الطلبات الحالية</button>
            <button id="tab-menu" onclick="switchTab('menu')">إدارة المنيو</button>
        </div>
        <div id="ordersSection"></div>
        <div id="menuSection" style="display:none; margin-top:20px;"></div>
    </div>

    <!-- منطقة الطباعة المخفية -->
    <div id="printArea" style="display:none;"></div>

    <script>
        let currentUser = null, dataInterval, allActiveOrders = [];

        function checkAuth() {
            currentUser = JSON.parse(localStorage.getItem('branchUser'));
            if(currentUser && (currentUser.role === 'branch' || currentUser.role === 'admin')) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                initApp();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        async function login() {
            const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
            const data = await res.json();
            if(data.success && (data.user.role === 'branch' || data.user.role === 'admin')) { localStorage.setItem('branchUser', JSON.stringify(data.user)); checkAuth(); }
            else Swal.fire('خطأ', 'بيانات غير صحيحة', 'error');
        }
        function logout() { localStorage.removeItem('branchUser'); clearInterval(dataInterval); checkAuth(); }

        async function initApp() {
            const res = await fetch('/api/branches'); const branches = await res.json();
            const select = document.getElementById('branchSelect');
            select.innerHTML = branches.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            if(currentUser.role === 'branch') { select.value = currentUser.branchId; select.disabled = true; }
            forceLoadData(); dataInterval = setInterval(loadDataSilently, 3000);
        }

        function switchTab(tab) {
            document.getElementById('ordersSection').style.display = tab === 'orders' ? 'grid' : 'none';
            document.getElementById('menuSection').style.display = tab === 'menu' ? 'block' : 'none';
            document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
            document.getElementById('tab-menu').classList.toggle('active', tab === 'menu');
            forceLoadData();
        }

        function forceLoadData() { loadDataSilently(); }

        function loadDataSilently() {
            if(document.getElementById('ordersSection').style.display !== 'none') fetchOrders();
            else fetchMenu();
        }

        async function fetchOrders() {
            const branchId = document.getElementById('branchSelect').value;
            if(!branchId) return;
            const res = await fetch('/api/orders/' + branchId);
            const orders = await res.json();
            
            allActiveOrders = orders.filter(o => o.status !== 'استلم الطلب');
            
            let html = allActiveOrders.map(order => `
                <div class="order-card" style="border-color: ${order.status === 'الطلب جاهز' ? '#27ae60' : '#E50914'}">
                    <button class="print-btn" onclick="printOrder('${order.id}')">🖨️ طباعة</button>
                    <div class="order-header">
                        <strong>#${order.id} - ${order.name}</strong>
                        <span style="color:#aaa;">${order.time}</span>
                    </div>
                    <div class="order-items">
                        ${order.items.map(i => `<div>• ${i.name} <span style="color:#E50914;">(x${i.qty})</span></div>`).join('')}
                    </div>
                    <div style="margin-top:10px; font-size:14px; color:#aaa;">الحالة: <strong style="color:white;">${order.status}</strong></div>
                    <div class="order-actions">
                        ${order.status === 'استلام الطلب' ? `<button class="btn btn-prep" onclick="updateStatus('${order.id}', 'قيد التجهيز')">بدء التجهيز</button>` : ''}
                        ${order.status === 'قيد التجهيز' ? `<button class="btn btn-ready" onclick="updateStatus('${order.id}', 'الطلب جاهز')">جاهز للتسليم</button>` : ''}
                        ${order.status === 'الطلب جاهز' ? `<button class="btn btn-done" onclick="updateStatus('${order.id}', 'استلم الطلب')">تم التسليم</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('ordersSection').innerHTML = html || '<div style="grid-column: 1 / -1; text-align:center; padding:50px; color:#777; font-size:20px;">لا توجد طلبات نشطة حالياً...</div>';
        }

        async function updateStatus(id, status) {
            await fetch(`/api/orders/${id}/status`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
            forceLoadData();
        }

        // 🖨️ دالة طباعة الفاتورة الحرارية
        function printOrder(orderId) {
            const order = allActiveOrders.find(o => o.id === orderId);
            if(!order) return;
            
            const printHtml = `
                <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                    <h2 style="margin:0; font-size:24px;">أبو مهل 🍔</h2>
                    <p style="margin:0; font-size:14px;">رقم الطلب: #${order.id}</p>
                    <p style="margin:0; font-size:14px;">الوقت: ${order.time}</p>
                </div>
                <div style="margin-bottom:10px; font-size:14px;">
                    <strong>العميل:</strong> ${order.name}  

                    <strong>الجوال:</strong> ${order.phone}
                </div>
                <table style="width:100%; font-size:14px; border-collapse:collapse; margin-bottom:10px;">
                    <tr style="border-bottom:1px solid #000;">
                        <th style="text-align:right; padding-bottom:5px;">الصنف</th>
                        <th style="text-align:center; padding-bottom:5px;">الكمية</th>
                        <th style="text-align:left; padding-bottom:5px;">السعر</th>
                    </tr>
                    ${order.items.map(i => `
                    <tr>
                        <td style="text-align:right; padding-top:5px;">${i.name}</td>
                        <td style="text-align:center; padding-top:5px;">${i.qty}</td>
                        <td style="text-align:left; padding-top:5px;">${i.price * i.qty}</td>
                    </tr>
                    `).join('')}
                </table>
                <div style="border-top:1px dashed #000; padding-top:10px; text-align:left; font-weight:bold; font-size:18px;">
                    الإجمالي: ${order.total} ريال
                </div>
                <div style="text-align:center; margin-top:20px; font-size:14px; font-weight:bold;">
                    شكراً لطلبكم من أبو مهل!
                </div>
            `;
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = printHtml;
            window.print();
        }

        async function fetchMenu() {
            const res = await fetch('/api/menu'); const menu = await res.json();
            document.getElementById('menuSection').innerHTML = menu.map(item => `
                <div style="background:#1f1f1f; padding:15px 20px; margin-bottom:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #E50914;">
                    <strong style="font-size:18px;">${item.name}</strong>
                    <button class="btn ${item.available ? 'btn-ready' : 'btn-prep'}" style="flex:none; width:150px;" onclick="toggleMenu('${item.id}')">
                        ${item.available ? 'متوفر ✅' : 'نفد ❌'}
                    </button>
                </div>
            `).join('');
        }

        async function toggleMenu(id) {
            await fetch(`/api/menu/${id}/toggle`, { method: 'PUT' });
            forceLoadData();
        }

        checkAuth();
    </script>

<script>
// --- التحديث الذكي للكميات (شاشة المطبخ) ---
window.loadMenu = async function() {
    if(!branchData) return;
    const r = await fetch('/api/menu?v=' + Date.now());
    const menu = await r.json();
    const container = document.getElementById('sec-menu');
    if(!container) return;
    container.innerHTML = menu.map(m => {
        const isOut = (m.outOfStockBranches || []).includes(branchData.branchId);
        return `<div class="card" style="text-align:center; justify-content:center; background:rgba(0,0,0,0.5); border:1px solid #333; border-radius:12px; padding:15px;">
            <h3 style="margin-top:0; color:#fff;">${m.name}</h3>
            <button class="btn ${isOut ? 'btn-red' : 'btn-green'}" style="width:100%; padding:12px; font-size:16px; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; background:${isOut ? '#E50914' : '#27ae60'};" onclick="window.tog('${m.id}')">
                ${isOut ? 'نفدت الكمية ❌' : 'متوفر ✅'}
            </button>
        </div>`;
    }).join('');
};
window.tog = async function(id) {
    await fetch('/api/menu/' + id + '/toggle/' + branchData.branchId, { method: 'PUT' });
    window.loadMenu();
};
</script>
</body>
</html>
