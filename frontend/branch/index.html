<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة المطبخ / الفرع</title>
    <style>
        body { font-family: Arial; background: #333; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 15px; border-radius: 8px; }
        select { padding: 10px; font-size: 16px; }
        .order-card { background: #444; padding: 15px; margin-top: 15px; border-radius: 8px; border-right: 5px solid #ff5722; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .btn-prep { background: #ff9800; color: white; }
        .btn-ready { background: #4caf50; color: white; }
        .btn-done { background: #2196f3; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>👨‍🍳 شاشة المطبخ والطلبات</h2>
        <select id="branchSelect" onchange="fetchOrders()">
            <option value="1">الفرع الرئيسي</option>
            <option value="2">فرع الشمال</option>
        </select>
    </div>
    <div id="ordersContainer"></div>

    <script>
        async function fetchOrders() {
            const branchId = document.getElementById('branchSelect').value;
            const res = await fetch('/api/orders/' + branchId);
            const orders = await res.json();
            
            let html = '';
            if(orders.length === 0) html = '<p style="text-align:center; margin-top:50px;">لا توجد طلبات حالياً...</p>';
            
            orders.forEach(order => {
                html += <div class="order-card">
                    <h3>طلب رقم #\ - \</h3>
                    <p>الوقت: \ | الحالة الحالية: <strong>\</strong></p>
                    <p>الطلب: \</p>
                    <hr style="border-color: #555;">
                    <button class="btn btn-prep" onclick="updateStatus(\, 'قيد التجهيز')">قيد التجهيز</button>
                    <button class="btn btn-ready" onclick="updateStatus(\, 'الطلب جاهز')">الطلب جاهز</button>
                    <button class="btn btn-done" onclick="updateStatus(\, 'استلم الطلب')">استلم الطلب</button>
                </div>;
            });
            document.getElementById('ordersContainer').innerHTML = html;
        }

        async function updateStatus(orderId, status) {
            await fetch(/api/orders/\/status, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            fetchOrders(); // تحديث الشاشة
        }

        // تحديث تلقائي كل 5 ثواني
        setInterval(fetchOrders, 5000);
        fetchOrders();
    </script>
</body>
</html>
