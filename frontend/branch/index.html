<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة الفرع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1e1e2f; color: #fff; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2a2a40; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3 ); }
        h2 { margin: 0; color: #ff9800; }
        select { padding: 10px 15px; font-family: 'Cairo'; font-size: 16px; border-radius: 8px; border: none; background: #3f3f5a; color: white; outline: none; }
        .tabs { margin-top: 20px; display: flex; gap: 10px; }
        .tabs button { padding: 12px 25px; background: #2a2a40; color: #aaa; border: none; cursor: pointer; border-radius: 8px; font-family: 'Cairo'; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .tabs button.active { background: #ff5722; color: white; }
        
        #ordersSection { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #2a2a40; padding: 20px; border-radius: 12px; border-right: 6px solid #ff9800; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #3f3f5a; padding-bottom: 10px; margin-bottom: 10px; }
        .order-items { flex-grow: 1; font-size: 16px; line-height: 1.6; color: #ddd; }
        .order-actions { display: flex; gap: 10px; margin-top: 15px; }
        
        .menu-card { background: #2a2a40; padding: 15px 20px; margin-top: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); }
        .btn-prep { background: #ff9800; color: white; } 
        .btn-ready { background: #4caf50; color: white; } 
        .btn-done { background: #2196f3; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>👨‍🍳 شاشة المطبخ والفرع</h2>
        <select id="branchSelect" onchange="forceLoadData()"></select>
    </div>
    <div class="tabs">
        <button id="tab-orders" class="active" onclick="switchTab('orders')">الطلبات الحالية</button>
        <button id="tab-menu" onclick="switchTab('menu')">إدارة توفر الأصناف</button>
    </div>

    <div id="ordersSection"></div>
    <div id="menuSection" style="display:none;"></div>

    <script>
        let lastOrdersString = "";
        let lastMenuString = "";
        let lastOrderCount = 0;

        async function init() {
            const res = await fetch('/api/branches');
            const branches = await res.json();
            document.getElementById('branchSelect').innerHTML = branches.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            forceLoadData();
            setInterval(loadDataSilently, 3000);
        }

        function switchTab(tab) {
            document.getElementById('ordersSection').style.display = tab === 'orders' ? 'grid' : 'none';
            document.getElementById('menuSection').style.display = tab === 'menu' ? 'block' : 'none';
            document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
            document.getElementById('tab-menu').classList.toggle('active', tab === 'menu');
            forceLoadData();
        }

        function forceLoadData() {
            lastOrdersString = ""; lastMenuString = ""; 
            loadDataSilently();
        }

        function loadDataSilently() {
            if(document.getElementById('ordersSection').style.display !== 'none') fetchOrders();
            else fetchMenu();
        }

        async function fetchOrders() {
            const branchId = document.getElementById('branchSelect').value;
            if(!branchId) return;
            const res = await fetch('/api/orders/' + branchId);
            const orders = await res.json();
            
            const activeOrders = orders.filter(o => o.status !== 'استلم الطلب');
            const currentString = JSON.stringify(activeOrders);
            
            if(currentString === lastOrdersString) return;
            lastOrdersString = currentString;

            if(activeOrders.length > lastOrderCount && lastOrderCount !== 0) {
                new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg' ).play().catch(()=>{});
                Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'طلب جديد!', showConfirmButton: false, timer: 2000 });
            }
            lastOrderCount = activeOrders.length;

            let html = activeOrders.map(order => `
                <div class="order-card" style="border-color: ${order.status === 'الطلب جاهز' ? '#4caf50' : '#ff9800'}">
                    <div class="order-header">
                        <strong>#${order.id} - ${order.name}</strong>
                        <span style="color:#aaa;">${order.time}</span>
                    </div>
                    <div class="order-items">
                        ${order.items.map(i => `<div>• ${i.name} <span style="color:#ff9800;">(x${i.qty})</span></div>`).join('')}
                    </div>
                    <div style="margin-top:10px; font-size:14px; color:#aaa;">الحالة: <strong style="color:white;">${order.status}</strong></div>
                    <div class="order-actions">
                        ${order.status === 'استلام الطلب' ? `<button class="btn btn-prep" onclick="updateStatus(${order.id}, 'قيد التجهيز')">بدء التجهيز</button>` : ''}
                        ${order.status === 'قيد التجهيز' ? `<button class="btn btn-ready" onclick="updateStatus(${order.id}, 'الطلب جاهز')">جاهز للتسليم</button>` : ''}
                        ${order.status === 'الطلب جاهز' ? `<button class="btn btn-done" onclick="updateStatus(${order.id}, 'استلم الطلب')">تم التسليم للعميل</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('ordersSection').innerHTML = html || '<div style="grid-column: 1 / -1; text-align:center; padding:50px; color:#777; font-size:20px;">لا توجد طلبات نشطة حالياً...</div>';
        }

        async function updateStatus(id, status) {
            await fetch(`/api/orders/${id}/status`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
            forceLoadData();
        }

        async function fetchMenu() {
            const res = await fetch('/api/menu');
            const menu = await res.json();
            
            const currentString = JSON.stringify(menu);
            if(currentString === lastMenuString) return;
            lastMenuString = currentString;

            document.getElementById('menuSection').innerHTML = menu.map(item => `
                <div class="menu-card">
                    <strong style="font-size:18px;">${item.name}</strong>
                    <button class="btn ${item.available ? 'btn-ready' : 'btn-prep'}" style="flex:none; width:150px;" onclick="toggleMenu(${item.id})">
                        ${item.available ? 'متوفر ✅' : 'نفدت الكمية ❌'}
                    </button>
                </div>
            `).join('');
        }

        async function toggleMenu(id) {
            await fetch(`/api/menu/${id}/toggle`, { method: 'PUT' });
            forceLoadData();
        }

        init();
    </script>
</body>
</html>
