<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق العميل</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; margin: 10px 0; background: #ff5722; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .step { display: none; } .active { display: block; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .menu-item { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .cart-summary { background: #fff3e0; padding: 15px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🍔 مطعمنا</h2>
        
        <div id="step1" class="step active">
            <h3>1. تسجيل البيانات</h3>
            <input type="text" id="cName" placeholder="الاسم الكريم" required>
            <input type="tel" id="cPhone" placeholder="رقم الجوال" required>
            <button class="btn" onclick="nextStep(2)">التالي</button>
        </div>

        <div id="step2" class="step">
            <h3>2. اختر نوع الخدمة</h3>
            <button class="btn" onclick="loadBranches()">استلام من الفرع</button>
            <button class="btn" disabled>توصيل (قريباً)</button>
        </div>

        <div id="step3" class="step">
            <h3>3. اختر الفرع</h3>
            <select id="branchSelect"></select>
            <button class="btn" onclick="loadMenu()">التالي</button>
        </div>

        <div id="step4" class="step">
            <h3>4. قائمة الطعام</h3>
            <div id="menuContainer"></div>
            <div class="cart-summary">
                <h4>السلة: <span id="cartTotal">0</span> ريال</h4>
                <button class="btn" onclick="checkout()" id="checkoutBtn" disabled>تأكيد الطلب والدفع</button>
            </div>
        </div>

        <div id="step5" class="step">
            <h3 style="text-align:center; color: #2e7d32;">تم إرسال الطلب للمطبخ!</h3>
            <div style="text-align: center; padding: 20px; background: #e8f5e9; border-radius: 5px;">
                <p>حالة الطلب الآن:</p>
                <h2 id="orderStatus" style="color: #ff5722;">جاري التحميل...</h2>
            </div>
        </div>
    </div>

    <script>
        let orderData = { name: '', phone: '', branchId: '', items: [], total: 0 };
        let trackingInterval;

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        async function loadBranches() {
            const res = await fetch('/api/branches');
            const branches = await res.json();
            document.getElementById('branchSelect').innerHTML = branches.map(b => <option value="\">\</option>).join('');
            nextStep(3);
        }

        async function loadMenu() {
            orderData.name = document.getElementById('cName').value;
            orderData.phone = document.getElementById('cPhone').value;
            orderData.branchId = document.getElementById('branchSelect').value;
            
            const res = await fetch('/api/menu');
            const menu = await res.json();
            
            let html = '';
            menu.forEach(item => {
                if(item.available) {
                    html += <div class="menu-item">
                        <span>\ - \ ريال</span>
                        <button class="btn" style="width:auto; margin:0; padding:5px 10px;" onclick="addToCart('\', \)">إضافة</button>
                    </div>;
                } else {
                    html += <div class="menu-item" style="background:#f9f9f9; color:#999;">
                        <span>\ - \ ريال</span>
                        <span style="color:red; font-size:12px;">نفدت الكمية</span>
                    </div>;
                }
            });
            document.getElementById('menuContainer').innerHTML = html;
            nextStep(4);
        }

        function addToCart(name, price) {
            orderData.items.push({ name, price });
            orderData.total += price;
            document.getElementById('cartTotal').innerText = orderData.total;
            document.getElementById('checkoutBtn').disabled = false;
        }

        async function checkout() {
            const res = await fetch('/api/orders', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData)
            });
            const data = await res.json();
            if(data.success) {
                nextStep(5);
                trackingInterval = setInterval(() => trackOrder(data.orderId), 3000);
            }
        }

        async function trackOrder(orderId) {
            const res = await fetch('/api/orders/track/' + orderId);
            const order = await res.json();
            document.getElementById('orderStatus').innerText = order.status;
            if(order.status === 'استلم الطلب') clearInterval(trackingInterval);
        }
    </script>
</body>
</html>
