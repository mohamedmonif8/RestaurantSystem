<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق العميل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; margin: 0; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05 ); }
        h2 { text-align: center; color: #ff5722; font-weight: 700; margin-bottom: 20px; }
        h3 { font-size: 18px; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn { width: 100%; padding: 14px; margin: 10px 0; background: #ff5722; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-family: 'Cairo'; font-weight: 600; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: #e64a19; transform: translateY(-2px); }
        .btn:disabled { background: #d3d3d3; cursor: not-allowed; transform: none; }
        .step { display: none; animation: fadeIn 0.5s; } .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 15px; transition: 0.3s; }
        input:focus, select:focus { border-color: #ff5722; outline: none; box-shadow: 0 0 5px rgba(255,87,34,0.3); }
        .menu-item { border: 1px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; transition: 0.3s; }
        .menu-item:hover { border-color: #ff5722; background: white; }
        .cart-summary { background: #fff3e0; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px dashed #ffb74d; }
        .qty-btn { background: #eee; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .qty-btn:hover { background: #ddd; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍔 مطعمنا</h2>
        
        <div id="step1" class="step active">
            <h3>1. تسجيل البيانات</h3>
            <input type="text" id="cName" placeholder="الاسم الكريم" required>
            <input type="tel" id="cPhone" placeholder="رقم الجوال" required>
            <button class="btn" onclick="nextStep(2)">التالي</button>
        </div>

        <div id="step2" class="step">
            <h3>2. اختر نوع الخدمة</h3>
            <button class="btn" onclick="loadBranches()">استلام من الفرع</button>
            <button class="btn" disabled>توصيل (قريباً)</button>
        </div>

        <div id="step3" class="step">
            <h3>3. اختر الفرع</h3>
            <select id="branchSelect"></select>
            <button class="btn" onclick="loadMenu()">التالي</button>
        </div>

        <div id="step4" class="step">
            <h3>4. قائمة الطعام</h3>
            <div id="menuContainer"></div>
            <div class="cart-summary">
                <h4 style="margin-top:0;">🛒 سلة المشتريات</h4>
                <div id="cartItemsContainer"></div>
                <hr style="border: 0; border-top: 1px solid #ffcc80; margin: 15px 0;">
                <h3 style="margin:0; color:#e64a19;">الإجمالي: <span id="cartTotal">0</span> ريال</h3>
                <button class="btn" onclick="checkout()" id="checkoutBtn" disabled style="margin-top:15px;">تأكيد الطلب والدفع</button>
            </div>
        </div>

        <div id="step5" class="step">
            <h3 style="text-align:center; color: #2e7d32;">🎉 تم إرسال الطلب بنجاح!</h3>
            <div style="text-align: center; padding: 30px 20px; background: #e8f5e9; border-radius: 10px; margin-top:20px;">
                <p style="font-size: 18px; color: #555;">حالة الطلب الآن:</p>
                <h2 id="orderStatus" style="color: #ff5722; font-size: 28px; margin: 10px 0;">جاري التحميل...</h2>
                <div class="loader" style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid #c8e6c9; border-top: 4px solid #4caf50; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>
        </div>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        let orderData = { name: '', phone: '', branchId: '', items: [], total: 0 };
        let cart = {}; // { id: {name, price, qty} }
        let trackingInterval;

        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, timerProgressBar: true });

        function nextStep(step) {
            if(step === 2 && (!document.getElementById('cName').value || !document.getElementById('cPhone').value)) {
                return Toast.fire({ icon: 'error', title: 'يرجى إدخال الاسم ورقم الجوال' });
            }
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        async function loadBranches() {
            const res = await fetch('/api/branches');
            const branches = await res.json();
            document.getElementById('branchSelect').innerHTML = branches.map(b => <option value="\">\</option>).join('');
            nextStep(3);
        }

        async function loadMenu() {
            orderData.name = document.getElementById('cName').value;
            orderData.phone = document.getElementById('cPhone').value;
            orderData.branchId = document.getElementById('branchSelect').value;
            
            const res = await fetch('/api/menu');
            const menu = await res.json();
            
            let html = '';
            menu.forEach(item => {
                if(item.available) {
                    html += <div class="menu-item">
                        <div><strong>\</strong>  
<span style="color:#777; font-size:14px;">\ ريال</span></div>
                        <button class="btn" style="width:auto; margin:0; padding:8px 15px; border-radius:20px;" onclick="updateCart(\, '\', \, 1)">+ إضافة</button>
                    </div>;
                } else {
                    html += <div class="menu-item" style="opacity: 0.6;">
                        <div><strong>\</strong>  
<span style="color:#777; font-size:14px;">\ ريال</span></div>
                        <span style="color:#e74c3c; font-weight:bold; font-size:14px;">نفدت الكمية</span>
                    </div>;
                }
            });
            document.getElementById('menuContainer').innerHTML = html;
            nextStep(4);
        }

        function updateCart(id, name, price, change) {
            if(!cart[id]) cart[id] = { name, price, qty: 0 };
            cart[id].qty += change;
            if(cart[id].qty <= 0) delete cart[id];
            
            if(change > 0) Toast.fire({ icon: 'success', title: 'تمت الإضافة للسلة' });
            renderCart();
        }

        function renderCart() {
            let html = '';
            let total = 0;
            orderData.items = [];
            
            for(let id in cart) {
                let item = cart[id];
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                orderData.items.push({ id, name: item.name, price: item.price, qty: item.qty });
                
                html += <div class="cart-item">
                    <span>\ (x\)</span>
                    <div>
                        <span style="margin-left:10px; font-weight:bold;">\ ريال</span>
                        <button class="qty-btn" onclick="updateCart(\, '\', \, 1)">+</button>
                        <button class="qty-btn" onclick="updateCart(\, '\', \, -1)">-</button>
                    </div>
                </div>;
            }
            
            document.getElementById('cartItemsContainer').innerHTML = html || '<p style="text-align:center; color:#999; font-size:14px;">السلة فارغة</p>';
            document.getElementById('cartTotal').innerText = total;
            orderData.total = total;
            document.getElementById('checkoutBtn').disabled = total === 0;
        }

        async function checkout() {
            document.getElementById('checkoutBtn').disabled = true;
            document.getElementById('checkoutBtn').innerText = 'جاري المعالجة...';
            
            const res = await fetch('/api/orders', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData)
            });
            const data = await res.json();
            if(data.success) {
                nextStep(5);
                trackingInterval = setInterval(() => trackOrder(data.orderId), 3000);
            }
        }

        async function trackOrder(orderId) {
            const res = await fetch('/api/orders/track/' + orderId);
            const order = await res.json();
            const statusEl = document.getElementById('orderStatus');
            
            if(statusEl.innerText !== order.status) {
                statusEl.innerText = order.status;
                statusEl.style.animation = 'none';
                setTimeout(() => statusEl.style.animation = 'fadeIn 0.5s', 10);
            }
            
            if(order.status === 'استلم الطلب') {
                clearInterval(trackingInterval);
                document.querySelector('.loader').style.display = 'none';
                Swal.fire('بالعافية!', 'تم استلام طلبك بنجاح، نتمنى لك وجبة شهية.', 'success');
            }
        }
    </script>
</body>
</html>
