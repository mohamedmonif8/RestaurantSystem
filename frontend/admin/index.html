<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px; margin-bottom: 10px; background: #34495e; border-radius: 5px; }
        .content { flex: 1; padding: 30px; }
        .cards { display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        .card h3 { margin: 0; color: #7f8c8d; }
        .card h1 { margin: 10px 0 0 0; color: #2c3e50; font-size: 40px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚙️ الإدارة</h2>
        <a href="#">📊 الملخص والتقارير</a>
        <a href="#">🏪 إدارة الفروع</a>
        <a href="#">🍔 إدارة المنيو</a>
        <a href="#">👥 الموظفين والعملاء</a>
        <a href="#">🎨 الإعدادات والمظهر</a>
    </div>
    <div class="content">
        <h2>الملخص العام</h2>
        <div class="cards">
            <div class="card"><h3>إجمالي الطلبات</h3><h1 id="totalOrders">0</h1></div>
            <div class="card"><h3>المبيعات (ريال)</h3><h1 id="totalRevenue">0</h1></div>
            <div class="card"><h3>عدد الفروع</h3><h1 id="branchesCount">0</h1></div>
        </div>
        <p style="margin-top: 30px; color: #666;">* ملاحظة: هذه واجهة مبدئية، سيتم تفعيل باقي الأزرار في المراحل القادمة.</p>
    </div>

    <script>
        async function loadSummary() {
            const res = await fetch('/api/admin/summary');
            const data = await res.json();
            document.getElementById('totalOrders').innerText = data.totalOrders;
            document.getElementById('totalRevenue').innerText = data.totalRevenue;
            document.getElementById('branchesCount').innerText = data.branchesCount;
        }
        loadSummary();
        setInterval(loadSummary, 5000);
    </script>
</body>
</html>
