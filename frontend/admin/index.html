<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px; margin-bottom: 10px; background: #34495e; border-radius: 5px; cursor: pointer; }
        .sidebar a.active { background: #e74c3c; }
        .content { flex: 1; padding: 30px; }
        .cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        .card h3 { margin: 0; color: #7f8c8d; } .card h1 { margin: 10px 0 0 0; color: #2c3e50; font-size: 40px; }
        .section { display: none; } .section.active { display: block; }
        table { width: 100%; background: white; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #2c3e50; color: white; }
        .btn { padding: 10px 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-danger { background: #e74c3c; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚙️ الإدارة</h2>
        <a class="active" onclick="showSection('summary', this)">📊 الملخص</a>
        <a onclick="showSection('branches', this)">🏪 إدارة الفروع</a>
        <a onclick="showSection('menu', this)">🍔 إدارة المنيو</a>
    </div>
    
    <div class="content">
        <!-- قسم الملخص -->
        <div id="summary" class="section active">
            <h2>الملخص العام</h2>
            <div class="cards">
                <div class="card"><h3>إجمالي الطلبات</h3><h1 id="totalOrders">0</h1></div>
                <div class="card"><h3>المبيعات (ريال)</h3><h1 id="totalRevenue">0</h1></div>
                <div class="card"><h3>عدد الفروع</h3><h1 id="branchesCount">0</h1></div>
            </div>
        </div>

        <!-- قسم الفروع -->
        <div id="branches" class="section">
            <h2>إدارة الفروع</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="newBranchName" placeholder="اسم الفرع الجديد">
                <button class="btn" onclick="addBranch()">إضافة فرع</button>
            </div>
            <table>
                <thead><tr><th>الرقم</th><th>اسم الفرع</th><th>إجراء</th></tr></thead>
                <tbody id="branchesTable"></tbody>
            </table>
        </div>

        <!-- قسم المنيو -->
        <div id="menu" class="section">
            <h2>إدارة المنيو</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="newItemName" placeholder="اسم الوجبة">
                <input type="number" id="newItemPrice" placeholder="السعر">
                <button class="btn" onclick="addMenuItem()">إضافة وجبة</button>
            </div>
            <table>
                <thead><tr><th>الرقم</th><th>اسم الوجبة</th><th>السعر</th><th>إجراء</th></tr></thead>
                <tbody id="menuTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'summary') loadSummary();
            if(id === 'branches') loadBranches();
            if(id === 'menu') loadMenu();
        }

        async function loadSummary() {
            const res = await fetch('/api/admin/summary');
            const data = await res.json();
            document.getElementById('totalOrders').innerText = data.totalOrders;
            document.getElementById('totalRevenue').innerText = data.totalRevenue;
            document.getElementById('branchesCount').innerText = data.branchesCount;
        }

        async function loadBranches() {
            const res = await fetch('/api/branches');
            const branches = await res.json();
            document.getElementById('branchesTable').innerHTML = branches.map(b => 
                <tr><td>\</td><td>\</td>
                <td><button class="btn btn-danger" onclick="deleteBranch(\)">حذف</button></td></tr>
            ).join('');
        }

        async function addBranch() {
            const name = document.getElementById('newBranchName').value;
            if(!name) return;
            await fetch('/api/branches', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
            document.getElementById('newBranchName').value = '';
            loadBranches();
        }

        async function deleteBranch(id) {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await fetch('/api/branches/' + id, { method: 'DELETE' });
                loadBranches();
            }
        }

        async function loadMenu() {
            const res = await fetch('/api/menu');
            const menu = await res.json();
            document.getElementById('menuTable').innerHTML = menu.map(m => 
                <tr><td>\</td><td>\</td><td>\ ريال</td>
                <td><button class="btn btn-danger" onclick="deleteMenuItem(\)">حذف</button></td></tr>
            ).join('');
        }

        async function addMenuItem() {
            const name = document.getElementById('newItemName').value;
            const price = document.getElementById('newItemPrice').value;
            if(!name || !price) return;
            await fetch('/api/menu', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, price}) });
            document.getElementById('newItemName').value = '';
            document.getElementById('newItemPrice').value = '';
            loadMenu();
        }

        async function deleteMenuItem(id) {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await fetch('/api/menu/' + id, { method: 'DELETE' });
                loadMenu();
            }
        }

        loadSummary();
    </script>
</body>
</html>
