<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | أبو مهل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; margin: 0; padding: 0; color: #333; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: #fff; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2 ); border-top: 5px solid #E50914; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: 'Cairo'; outline: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; background: #E50914; color: white; border: none; border-radius: 10px; font-family: 'Cairo'; font-weight: 900; cursor: pointer; font-size: 18px; }
        #mainApp { display: none; }
        .sidebar { width: 250px; background: #111; color: white; position: fixed; height: 100vh; padding-top: 20px; }
        .sidebar h2 { text-align: center; color: #E50914; margin-bottom: 30px; font-weight: 900; }
        .sidebar button { display: block; width: 100%; padding: 15px 20px; background: none; border: none; color: #aaa; text-align: right; font-family: 'Cairo'; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; border-right: 4px solid transparent; }
        .sidebar button:hover, .sidebar button.active { background: #222; color: white; border-right-color: #E50914; }
        .sidebar .logout { margin-top: 50px; color: #ff4757; }
        .content { margin-right: 250px; padding: 30px; }
        .section { display: none; animation: fadeIn 0.3s; } .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #E50914; }
        .card h3 { margin: 0; color: #666; font-size: 16px; }
        .card p { margin: 10px 0 0; font-size: 30px; font-weight: 900; color: #111; }
        table { width: 100%; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #111; color: white; }
        tr:hover { background: #f9f9f9; }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; color: white; }
        .btn-add { background: #27ae60; margin-bottom: 15px; }
        .btn-del { background: #e74c3c; }
        .btn-view { background: #2980b9; }
        .timeline { text-align: right; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-right: 4px solid #E50914; }
        .timeline-item { margin-bottom: 10px; font-size: 15px; }
        .timeline-item span { font-weight: bold; color: #111; display: inline-block; width: 120px; }
        .timeline-item .time { color: #E50914; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#E50914; margin-top:0;">لوحة الإدارة</h2>
            <input type="text" id="loginUser" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="sidebar">
            <h2>أبو مهل 🍔</h2>
            <button class="tab-btn active" onclick="showSection('dashboard')">📊 الملخص</button>
            <button class="tab-btn" onclick="showSection('orders')">📋 سجل الطلبات</button>
            <button class="tab-btn" onclick="showSection('branches')">🏪 الفروع</button>
            <button class="tab-btn" onclick="showSection('menu')">🍔 المنيو</button>
            <button class="tab-btn" onclick="showSection('users')">👥 المستخدمين</button>
            <button class="logout" onclick="logout()">🚪 تسجيل خروج</button>
        </div>
        
        <div class="content">
            <div id="sec-dashboard" class="section active">
                <h2 style="margin-top:0;">📊 ملخص النظام</h2>
                <div class="cards">
                    <div class="card"><h3>إجمالي الطلبات</h3><p id="sum-orders">0</p></div>
                    <div class="card"><h3>المبيعات (ريال)</h3><p id="sum-revenue">0</p></div>
                    <div class="card"><h3>عدد الفروع</h3><p id="sum-branches">0</p></div>
                    <div class="card"><h3>المستخدمين</h3><p id="sum-users">0</p></div>
                </div>
            </div>

            <div id="sec-orders" class="section">
                <h2 style="margin-top:0;">📋 سجل الطلبات الشامل</h2>
                <table>
                    <thead><tr><th>رقم الطلب</th><th>العميل</th><th>الفرع</th><th>الإجمالي</th><th>الحالة</th><th>التفاصيل</th></tr></thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>

            <div id="sec-branches" class="section">
                <h2 style="margin-top:0;">🏪 إدارة الفروع</h2>
                <button class="btn btn-add" onclick="addBranch()">+ إضافة فرع جديد</button>
                <table><thead><tr><th>اسم الفرع</th><th>إجراء</th></tr></thead><tbody id="branchesTable"></tbody></table>
            </div>

            <div id="sec-menu" class="section">
                <h2 style="margin-top:0;">🍔 إدارة المنيو</h2>
                <button class="btn btn-add" onclick="addMenu()">+ إضافة صنف جديد</button>
                <table><thead><tr><th>الصنف</th><th>السعر</th><th>إجراء</th></tr></thead><tbody id="menuTable"></tbody></table>
            </div>

            <div id="sec-users" class="section">
                <h2 style="margin-top:0;">👥 إدارة المستخدمين</h2>
                <button class="btn btn-add" onclick="addUser()">+ إضافة مستخدم</button>
                <table><thead><tr><th>الاسم</th><th>اسم المستخدم</th><th>الصلاحية</th><th>إجراء</th></tr></thead><tbody id="usersTable"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        let branchesList = [];
        let allOrdersList = [];

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('adminUser'));
            if(user && user.role === 'admin') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadAllData();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        async function login() {
            const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
            const data = await res.json();
            if(data.success && data.user.role === 'admin') { localStorage.setItem('adminUser', JSON.stringify(data.user)); checkAuth(); }
            else Swal.fire('خطأ', 'بيانات غير صحيحة أو لا تملك صلاحية', 'error');
        }
        function logout() { localStorage.removeItem('adminUser'); checkAuth(); }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            loadAllData();
        }

        async function loadAllData() {
            const resB = await fetch('/api/branches'); branchesList = await resB.json();
            const resS = await fetch('/api/admin/summary'); const sum = await resS.json();
            document.getElementById('sum-orders').innerText = sum.totalOrders;
            document.getElementById('sum-revenue').innerText = sum.totalRevenue;
            document.getElementById('sum-branches').innerText = sum.branchesCount;
            document.getElementById('sum-users').innerText = sum.usersCount;

            const resO = await fetch('/api/admin/orders'); allOrdersList = await resO.json();
            document.getElementById('ordersTable').innerHTML = allOrdersList.map(o => {
                const bName = branchesList.find(b => b.id === o.branchId)?.name || 'غير معروف';
                return `<tr>
                    <td>#${o.id}</td><td>${o.name}</td><td>${bName}</td><td>${o.total} ريال</td>
                    <td><strong style="color:${o.status==='استلم الطلب'?'#27ae60':'#E50914'}">${o.status}</strong></td>
                    <td><button class="btn btn-view" onclick="viewOrder('${o.id}')">👁️ عرض التفاصيل</button></td>
                </tr>`;
            }).join('');

            document.getElementById('branchesTable').innerHTML = branchesList.map(b => `<tr><td>${b.name}</td><td><button class="btn btn-del" onclick="del('/api/branches/${b.id}')">حذف</button></td></tr>`).join('');
            const resM = await fetch('/api/menu'); const menu = await resM.json();
            document.getElementById('menuTable').innerHTML = menu.map(m => `<tr><td>${m.name}</td><td>${m.price} ريال</td><td><button class="btn btn-del" onclick="del('/api/menu/${m.id}')">حذف</button></td></tr>`).join('');
            const resU = await fetch('/api/users'); const users = await resU.json();
            document.getElementById('usersTable').innerHTML = users.map(u => `<tr><td>${u.name}</td><td>${u.username}</td><td>${u.role==='admin'?'مدير عام':'موظف فرع'}</td><td><button class="btn btn-del" onclick="del('/api/users/${u.id}')">حذف</button></td></tr>`).join('');
        }

        function viewOrder(orderId) {
            const order = allOrdersList.find(o => o.id === orderId);
            if(!order) return;
            const bName = branchesList.find(b => b.id === order.branchId)?.name || 'غير معروف';
            const t = order.timestamps || {};

            const html = `
                <div style="text-align:right; font-family:'Cairo';">
                    <h3 style="color:#E50914; border-bottom:2px solid #eee; padding-bottom:10px; margin-top:0;">معلومات الطلب #${order.id}</h3>
                    <p style="margin:5px 0;"><strong>العميل:</strong> ${order.name} (${order.phone})</p>
                    <p style="margin:5px 0;"><strong>الفرع:</strong> ${bName}</p>
                    <h4 style="margin:15px 0 5px 0; color:#333;">🛒 الأصناف:</h4>
                    <ul style="list-style:none; padding:0; margin:0; background:#fff; border:1px solid #eee; border-radius:8px; padding:10px;">
                        ${order.items.map(i => `<li style="margin-bottom:5px; border-bottom:1px dashed #eee; padding-bottom:5px;">- ${i.name} <span style="color:#E50914; font-weight:bold;">(x${i.qty})</span> <span style="float:left;">${i.price * i.qty} ريال</span></li>`).join('')}
                    </ul>
                    <h3 style="margin-top:10px; text-align:left;">الإجمالي: <span style="color:#E50914;">${order.total} ريال</span></h3>
                    <div class="timeline">
                        <h4 style="margin-top:0; color:#E50914; border-bottom:1px solid #ddd; padding-bottom:5px;">⏱️ سجل أوقات الطلب:</h4>
                        <div class="timeline-item"><span>📥 استلام الطلب:</span> <span class="time">${t.received || '---'}</span></div>
                        <div class="timeline-item"><span>👨‍🍳 بدء التجهيز:</span> <span class="time">${t.preparing || '---'}</span></div>
                        <div class="timeline-item"><span>🛍️ الطلب جاهز:</span> <span class="time">${t.ready || '---'}</span></div>
                        <div class="timeline-item"><span>✅ تم التسليم:</span> <span class="time">${t.delivered || '---'}</span></div>
                    </div>
                </div>
            `;
            Swal.fire({ html: html, showCloseButton: true, showConfirmButton: false, width: '500px' });
        }

        async function addBranch() { const { value: name } = await Swal.fire({ title: 'اسم الفرع', input: 'text', confirmButtonText: 'إضافة', confirmButtonColor: '#27ae60' }); if(name) { await fetch('/api/branches', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) }); loadAllData(); } }
        async function addMenu() { const { value: formValues } = await Swal.fire({ title: 'إضافة صنف', html: '<input id="swal-input1" class="swal2-input" placeholder="اسم الصنف"><input id="swal-input2" type="number" class="swal2-input" placeholder="السعر">', focusConfirm: false, confirmButtonText: 'إضافة', confirmButtonColor: '#27ae60', preConfirm: () => [document.getElementById('swal-input1').value, document.getElementById('swal-input2').value] }); if(formValues && formValues[0] && formValues[1]) { await fetch('/api/menu', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name: formValues[0], price: Number(formValues[1])}) }); loadAllData(); } }
        async function addUser() { const branchOptions = branchesList.map(b => `<option value="${b.id}">${b.name}</option>`).join(''); const { value: formValues } = await Swal.fire({ title: 'إضافة مستخدم', html: `<input id="u-name" class="swal2-input" placeholder="الاسم الكامل"><input id="u-user" class="swal2-input" placeholder="اسم المستخدم (للدخول)"><input id="u-pass" class="swal2-input" placeholder="كلمة المرور"><select id="u-role" class="swal2-input" style="width:73%;"><option value="branch">موظف فرع</option><option value="admin">مدير عام</option></select><select id="u-branch" class="swal2-input" style="width:73%;"><option value="">بدون فرع (للمدير)</option>${branchOptions}</select>`, focusConfirm: false, confirmButtonText: 'إضافة', confirmButtonColor: '#27ae60', preConfirm: () => ({ name: document.getElementById('u-name').value, username: document.getElementById('u-user').value, password: document.getElementById('u-pass').value, role: document.getElementById('u-role').value, branchId: document.getElementById('u-branch').value }) }); if(formValues && formValues.username) { await fetch('/api/users', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(formValues) }); loadAllData(); } }
        async function del(url) { if((await Swal.fire({title:'هل أنت متأكد؟', icon:'warning', showCancelButton:true, confirmButtonText:'نعم، احذف', cancelButtonText:'إلغاء', confirmButtonColor:'#e74c3c'})).isConfirmed) { await fetch(url, { method: 'DELETE' }); loadAllData(); } }

        checkAuth();
    </script>
</body>
</html>
